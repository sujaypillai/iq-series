name: 'Foundry IQ Badge Request'
description: "Submit this issue to acknowledge completion of all 3 Foundry IQ episode cookbooks."
title: "<First Name Last Name> Foundry IQ Badge Request"
labels:
  - foundry-iq-badge
body:
  - type: markdown
    attributes:
      value: |
        ### IMPORTANT: We issue badges from the [Global AI Community](https://globalai.community). Please ensure you have [signed up for an account](https://globalai.community/auth/login) to view your badge. After you submit your issue, please submit this [form](https://aka.ms/iq-series/foundry-iq-badge-form) to initiate your badge request. This step is required as we cannot issue a badge without it. Failure to fill out the required screenshots, inputs or badge form will result in the issue being closed.

  - type: checkboxes
    attributes:
      label: Curriculum Completion Validation
      description: Please check this to confirm that you have completed all 3 Foundry IQ episode cookbooks.
      options:
        - label: I verify that I have completed all 3 Foundry IQ episode cookbooks end-to-end.
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Episode completion proof

        For each episode: fork the repo, run all notebook cells, and commit the notebook with outputs saved. Paste the direct link to your forked notebook. Screenshots must show your final cell output with your GitHub username or Azure resource name visible.

  - type: checkboxes
    attributes:
      label: "Ep 1 — Unlocking Knowledge for Agents: solution verification"
      description: Please upload a screenshot of your final notebook output for Episode 1 into the field below.
      options:
        - label: I verify that I have uploaded a screenshot of my Episode 1 final notebook output with my GitHub username or Azure resource name shown into the field below.
          required: true

  - type: textarea
    id: ep1_fork
    attributes:
      label: "Ep 1 — fork URL"
      description: "Paste the link to your forked notebook with committed cell outputs."
      placeholder: "https://github.com/your-username/iq-series/blob/main/1-Foundry-IQ-..."
    validations:
      required: true

  - type: textarea
    id: ep1_screenshot
    attributes:
      label: "Ep 1 — final output screenshot"
      placeholder: "Drag and drop screenshot here"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: "Ep 2 — Building the Data Pipeline with Knowledge Sources: solution verification"
      description: Please upload a screenshot of your final notebook output for Episode 2 into the field below.
      options:
        - label: I verify that I have uploaded a screenshot of my Episode 2 final notebook output with my GitHub username or Azure resource name shown into the field below.
          required: true

  - type: textarea
    id: ep2_fork
    attributes:
      label: "Ep 2 — fork URL"
      description: "Paste the link to your forked notebook with committed cell outputs."
      placeholder: "https://github.com/your-username/iq-series/blob/main/2-Foundry-IQ-..."
    validations:
      required: true

  - type: textarea
    id: ep2_screenshot
    attributes:
      label: "Ep 2 — final output screenshot"
      placeholder: "Drag and drop screenshot here"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: "Ep 3 — Querying the Multi-Source AI Knowledge Bases: solution verification"
      description: Please upload a screenshot of your final notebook output for Episode 3 into the field below.
      options:
        - label: I verify that I have uploaded a screenshot of my Episode 3 final notebook output with my GitHub username or Azure resource name shown into the field below.
          required: true

  - type: textarea
    id: ep3_fork
    attributes:
      label: "Ep 3 — fork URL"
      description: "Paste the link to your forked notebook with committed cell outputs."
      placeholder: "https://github.com/your-username/iq-series/blob/main/3-Foundry-IQ-..."
    validations:
      required: true

  - type: textarea
    id: ep3_screenshot
    attributes:
      label: "Ep 3 — final output screenshot"
      placeholder: "Drag and drop screenshot here"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: technical_reflection
    attributes:
      label: Episode Insights & Key Takeaways
      description: |
        To verify your engagement with the series [video content](https://aka.ms/iq-series/episodes), please provide one brief, specific technical takeaway or "aha!" moment from each of the three Foundry IQ episodes.
      placeholder: |
        Episode 1: [Your insight]
        Episode 2: [Your insight]
        Episode 3: [Your insight]
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Challenges or feedback
      description: "Any blockers or steps that need clearer documentation? This helps us improve the cookbooks."
      placeholder: "Optional"
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: checkboxes
    attributes:
      label: Badge form confirmation
      description: "In order to receive your badge, please fill out the [Foundry IQ badge form](https://aka.ms/iq-series/foundry-iq-badge-form). If you do not submit this form, you will not be eligible to receive a badge."
      options:
        - label: I verify that I have completed the Foundry IQ badge form.
          required: true
